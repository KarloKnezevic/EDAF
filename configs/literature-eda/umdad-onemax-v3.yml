schema: "3.0"

run:
  id: literature-umdad-onemax-v3
  name: UMDAd on OneMax (v3)
  masterSeed: 31001
  deterministicStreams: true
  checkpointEveryIterations: 0

representation:
  type: bitstring
  length: 80

problem:
  type: onemax

algorithm:
  type: umdad
  populationSize: 220
  elitism: 1
  selectionRatio: 0.4

model:
  type: umda-bernoulli
  smoothing: 0.01

selection:
  type: truncation

replacement:
  type: elitist

stopping:
  type: max-iterations
  maxIterations: 180

constraints:
  type: identity

localSearch:
  type: none

restart:
  type: none

niching:
  type: none

observability:
  metricsEveryIterations: 10
  emitModelDiagnostics: true

persistence:
  enabled: true
  sinks: [console, csv, jsonl]
  outputDirectory: ./results/literature-eda
  database:
    enabled: false
    url: jdbc:sqlite:edaf-v3.db
    user: ""
    password: ""

reporting:
  enabled: true
  formats: [html]
  outputDirectory: ./reports/literature-eda

web:
  enabled: false
  port: 7070
  pollSeconds: 3

logging:
  modes: [console, jsonl, file]
  verbosity: normal
  jsonlFile: ./results/literature-eda/umdad-onemax-events.jsonl
  logFile: ./results/literature-eda/umdad-onemax.log
