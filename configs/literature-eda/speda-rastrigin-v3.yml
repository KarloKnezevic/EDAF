schema: "3.0"

run:
  id: literature-speda-rastrigin-v3
  name: SPEDA on Rastrigin (v3)
  masterSeed: 31006
  deterministicStreams: true
  checkpointEveryIterations: 10

representation:
  type: real-vector
  length: 14
  lower: -5.12
  upper: 5.12

problem:
  type: rastrigin

algorithm:
  type: speda
  populationSize: 220
  elitism: 1
  selectionRatio: 0.4

model:
  type: gmm
  components: 4
  emIterations: 25
  minVariance: 1.0e-8

selection:
  type: truncation

replacement:
  type: elitist

stopping:
  type: max-iterations
  maxIterations: 160

constraints:
  type: repair

localSearch:
  type: none

restart:
  type: none

niching:
  type: none

observability:
  metricsEveryIterations: 10
  emitModelDiagnostics: true

persistence:
  enabled: true
  sinks: [console, csv, jsonl]
  outputDirectory: ./results/literature-eda
  database:
    enabled: false
    url: jdbc:sqlite:edaf-v3.db
    user: ""
    password: ""

reporting:
  enabled: true
  formats: [html]
  outputDirectory: ./reports/literature-eda

web:
  enabled: false
  port: 7070
  pollSeconds: 3

logging:
  modes: [console, jsonl, file]
  verbosity: normal
  jsonlFile: ./results/literature-eda/speda-rastrigin-events.jsonl
  logFile: ./results/literature-eda/speda-rastrigin.log
