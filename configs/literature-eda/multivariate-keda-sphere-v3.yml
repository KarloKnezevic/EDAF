schema: "3.0"

run:
  id: literature-multivariate-keda-sphere-v3
  name: MultivariateKEDA on Sphere (v3)
  masterSeed: 31007
  deterministicStreams: true
  checkpointEveryIterations: 10

representation:
  type: real-vector
  length: 18
  lower: -5.0
  upper: 5.0

problem:
  type: sphere

algorithm:
  type: multivariate-keda
  populationSize: 200
  elitism: 1
  selectionRatio: 0.45

model:
  type: kde
  bandwidth: 0.6
  minBandwidth: 1.0e-8

selection:
  type: truncation

replacement:
  type: elitist

stopping:
  type: max-iterations
  maxIterations: 150

constraints:
  type: repair

localSearch:
  type: none

restart:
  type: none

niching:
  type: none

observability:
  metricsEveryIterations: 10
  emitModelDiagnostics: true

persistence:
  enabled: true
  sinks: [console, csv, jsonl]
  outputDirectory: ./results/literature-eda
  database:
    enabled: false
    url: jdbc:sqlite:edaf-v3.db
    user: ""
    password: ""

reporting:
  enabled: true
  formats: [html]
  outputDirectory: ./reports/literature-eda

web:
  enabled: false
  port: 7070
  pollSeconds: 3

logging:
  modes: [console, jsonl, file]
  verbosity: normal
  jsonlFile: ./results/literature-eda/multivariate-keda-sphere-events.jsonl
  logFile: ./results/literature-eda/multivariate-keda-sphere.log
