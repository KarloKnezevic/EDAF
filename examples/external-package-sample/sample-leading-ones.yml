schema: "3.0"

run:
  id: external-leading-ones-demo
  name: External Plugin Demo - Leading Ones
  masterSeed: 2026022405
  deterministicStreams: true
  checkpointEveryIterations: 5

representation:
  type: bitstring
  length: 80

problem:
  type: leading-ones-ext

algorithm:
  type: umda
  populationSize: 200
  selectionRatio: 0.40
  elitism: 1

model:
  type: umda-bernoulli
  smoothing: 0.01

selection:
  type: truncation

replacement:
  type: elitist

stopping:
  type: max-iterations
  maxIterations: 120

constraints:
  type: identity

localSearch:
  type: none

restart:
  type: none

niching:
  type: none

observability:
  metricsEveryIterations: 1
  emitModelDiagnostics: true

persistence:
  enabled: true
  sinks: [console, csv, jsonl, db]
  outputDirectory: ./results/external-package-sample
  database:
    enabled: true
    url: jdbc:sqlite:examples/external-package-sample/external-edaf.db
    user: ""
    password: ""

reporting:
  enabled: true
  formats: [html]
  outputDirectory: ./reports/external-package-sample

web:
  enabled: true
  port: 7070
  pollSeconds: 3

logging:
  modes: [console, file, db]
  verbosity: normal
  logFile: ./results/external-package-sample/external-leading-ones.log
